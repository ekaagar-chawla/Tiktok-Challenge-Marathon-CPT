<!DOCTYPE html>
<html>

<head>
    <title>Your results.</title>
    <link rel="stylesheet" href="end.css">
    <link rel="stylesheet" href="cursor.css">
</head>

<body>
    <div id="page">
        <header>
            <h1>Marathon Complete</h1>
            <p id="subtitle">Here's how you did across all three challenges</p>
        </header>

        <div id="results">
            <div class="card" id="card-swap">
                <h2 class="card-title">Swap the Bottles</h2>
                <div class="card-time" id="swapTime">00:00:00</div>
                <div class="card-label">completion time</div>
            </div>

            <div class="card" id="card-pins">
                <h2 class="card-title">Hit the Pins</h2>
                <div class="card-time" id="pinsTime">00:00:00</div>
                <div class="card-label">completion time</div>
            </div>

            <div class="card" id="card-puzzle">
                <h2 class="card-title">Solve the Puzzle</h2>
                <div class="card-time" id="puzzleTime">00:00:00</div>
                <div class="card-label">completion time</div>
            </div>
        </div>

        <div id="total-card">
            <span id="total-label">Total Time</span>
            <span id="totalTime">00:00:00</span>
        </div>

        <button id="replay">Play Again</button>
    </div>

    <div id="cursor-wrapper">
        <div id="cursor-dot"></div>
        <div id="tl" class="corner"></div>
        <div id="tr" class="corner"></div>
        <div id="br" class="corner"></div>
        <div id="bl" class="corner"></div>
    </div>

    <script src="end.js"></script>
    <script src="cursor.js"></script>
</body>

</html>
